<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Candles Gap Sentimentor</title>
<meta name="description" content="Candles Gap Sentimentor" />
<style>
  :root {
    --bg: #0f1117;
    --panel: #161a23;
    --panel-2: #1d2230;
    --border: #2a2f3d;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #6ea8ff;
    --accent-2: #4dd4a4;
    --bad: #ff6b6b;
    --good: #4dd4a4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(110,168,255,0.10), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(77,212,164,0.08), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  header {
    padding: 18px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .logo { display: inline-flex; align-items: flex-end; gap: 3px; height: 24px; }
  .logo span { width: 5px; border-radius: 2px; display: inline-block; }
  .logo .c1 { height: 13px; background: var(--good); }
  .logo .c2 { height: 22px; background: var(--accent); }
  .logo .c3 { height: 9px;  background: var(--bad); }
  .logo .c4 { height: 18px; background: var(--accent-2); }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }

  /* ===== Page content goes here ===== */
  main {
    flex: 1;
    max-width: 1200px; width: 100%;
    margin: 0 auto; padding: 32px;
  }

  footer {
    padding: 20px 32px; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 12px; text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <header>
    <span class="logo" aria-hidden="true">
      <span class="c1"></span><span class="c2"></span><span class="c3"></span><span class="c4"></span>
    </span>
    <h1>Candles Gap Sentimentor</h1>
  </header>

  <main>
    <!-- Add your content here -->
  </main>

  <footer>
    Candles Gap Sentimentor
  </footer>
</body>
</html>
