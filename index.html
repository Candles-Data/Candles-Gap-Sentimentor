<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Candles Gap Sentimentor</title>
<meta name="description" content="Daily TradingView screener snapshot." />
<style>
  :root {
    --bg: #0f1117; --panel: #161a23; --panel-2: #1d2230; --border: #2a2f3d;
    --text: #e6e9ef; --muted: #8b93a7; --accent: #6ea8ff; --accent-2: #4dd4a4;
    --bad: #ff6b6b; --good: #4dd4a4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(110,168,255,0.10), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(77,212,164,0.08), transparent 55%), var(--bg);
    color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  header { padding: 18px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { display: inline-flex; align-items: flex-end; gap: 3px; height: 24px; }
  .logo span { width: 5px; border-radius: 2px; display: inline-block; }
  .logo .c1 { height: 13px; background: var(--good); } .logo .c2 { height: 22px; background: var(--accent); }
  .logo .c3 { height: 9px; background: var(--bad); } .logo .c4 { height: 18px; background: var(--accent-2); }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  header .updated { margin-left: auto; font-size: 12px; color: var(--muted); }
  main { flex: 1; max-width: 1280px; width: 100%; margin: 0 auto; padding: 24px 32px 64px; }
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input { background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 7px; font-size: 14px; min-width: 220px; }
  .toolbar .src { font-size: 12px; color: var(--muted); margin-left: auto; }
  .table-scroll { border: 1px solid var(--border); border-radius: 10px; overflow: auto; max-height: 72vh; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 9px 12px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--border); }
  th { position: sticky; top: 0; background: var(--panel-2); color: var(--muted); font-weight: 600;
    cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  th .arrow { font-size: 10px; opacity: 0.7; }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--panel); z-index: 2; }
  th:first-child { z-index: 3; background: var(--panel-2); }
  td:first-child { font-weight: 600; }
  tbody tr:hover td { background: rgba(110,168,255,0.05); }
  .pos { color: var(--good); } .neg { color: var(--bad); } .mut { color: var(--muted); }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  footer { padding: 20px 32px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12px; text-align: center; }
</style>
</head>
<body>
  <header>
    <span class="logo" aria-hidden="true"><span class="c1"></span><span class="c2"></span><span class="c3"></span><span class="c4"></span></span>
    <h1>Candles Gap Sentimentor</h1>
    <span class="updated" id="updated">loading…</span>
  </header>

  <main>
    <div class="toolbar">
      <input type="text" id="search" placeholder="Filter rows…" />
      <span class="src" id="source"></span>
    </div>
    <div class="table-scroll">
      <table id="tbl">
        <thead><tr id="head"></tr></thead>
        <tbody id="body"></tbody>
      </table>
    </div>
    <div class="empty hidden" id="empty"></div>
  </main>

  <footer>Candles Gap Sentimentor · data refreshed daily · built for educational use, not financial advice.</footer>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var state = { data: null, sortKey: null, sortDir: -1, filter: "" };

  // value formatting driven by each column's "fmt" hint
  function fmtVal(col, v) {
    if (v === null || v === undefined || v === "") return "—";
    var fmt = col.fmt || "text";
    if (fmt !== "text" && typeof v !== "number") return String(v);
    switch (fmt) {
      case "pct":
        return '<span class="' + (v >= 0 ? "pos" : "neg") + '">' + (v >= 0 ? "+" : "") + v.toFixed(2) + "%</span>";
      case "price":
        return v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 4 });
      case "vol":
        if (v >= 1e6) return (v / 1e6).toFixed(2) + "M";
        if (v >= 1e3) return (v / 1e3).toFixed(1) + "K";
        return v.toLocaleString("en-US");
      case "money":
        if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
        if (v >= 1e6) return "$" + (v / 1e6).toFixed(1) + "M";
        return "$" + v.toLocaleString("en-US");
      default:
        return String(v);
    }
  }

  function render() {
    var d = state.data;
    if (!d) return;
    $("updated").textContent = "updated " + new Date(d.updated).toLocaleString();
    $("source").textContent = d.source + (d.total_count != null ? " · " + d.total_count + " matches" : "");

    // header
    var head = $("head"); head.innerHTML = "";
    d.columns.forEach(function (c) {
      var th = document.createElement("th");
      var arrow = state.sortKey === c.left ? (state.sortDir < 0 ? " ▼" : " ▲") : "";
      th.innerHTML = c.label + '<span class="arrow">' + arrow + "</span>";
      th.addEventListener("click", function () {
        if (state.sortKey === c.left) state.sortDir *= -1;
        else { state.sortKey = c.left; state.sortDir = -1; }
        render();
      });
      head.appendChild(th);
    });

    // rows
    var rows = d.rows.slice();
    var f = state.filter.toLowerCase();
    if (f) rows = rows.filter(function (r) {
      return d.columns.some(function (c) { return String(r[c.left] == null ? "" : r[c.left]).toLowerCase().indexOf(f) !== -1; });
    });
    if (state.sortKey) {
      var k = state.sortKey, dir = state.sortDir;
      rows.sort(function (a, b) {
        var av = a[k], bv = b[k];
        if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
        return String(av).localeCompare(String(bv)) * dir;
      });
    }

    var body = $("body"); body.innerHTML = "";
    rows.forEach(function (r) {
      var tr = document.createElement("tr");
      tr.innerHTML = d.columns.map(function (c) { return "<td>" + fmtVal(c, r[c.left]) + "</td>"; }).join("");
      body.appendChild(tr);
    });
    $("empty").classList.toggle("hidden", rows.length > 0);
    if (rows.length === 0) $("empty").textContent = "No rows match your filter.";
  }

  $("search").addEventListener("input", function (e) { state.filter = e.target.value; render(); });

  fetch("data.json?_=" + Date.now())
    .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(function (d) {
      state.data = d;
      // default sort: pre-market change desc, else first numeric column
      state.sortKey = (d.columns.find(function (c) { return c.left === "premarket_change"; }) ||
                       d.columns.find(function (c) { return c.fmt && c.fmt !== "text"; }) || {}).left || null;
      render();
    })
    .catch(function (err) {
      $("updated").textContent = "";
      $("empty").classList.remove("hidden");
      $("empty").textContent = "Could not load data.json (" + err.message + "). Once the daily job writes data.json, it will appear here.";
    });
})();
</script>
</body>
</html>
