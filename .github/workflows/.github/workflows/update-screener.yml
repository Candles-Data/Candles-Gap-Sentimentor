name: Update screener data

on:
  schedule:
    # 21:30 UTC on weekdays (after US market close). Adjust to your timezone.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # allows manual "Run workflow" button

permissions:
  contents: write   # needed to commit data.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch screener -> data.json
        run: python scripts/fetch_screener.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No changes in data.json"
          else
            git add data.json
            git commit -m "chore: update screener data ($(date -u +%Y-%m-%d))"
            git push
          fi
